<template id="scene7-template">
  <div data-composition-id="scene7" data-width="1920" data-height="1080">
    <div class="vignette" style="background: radial-gradient(ellipse at center, transparent 40%, rgba(8,12,24,0.7) 100%);"></div>
    <div class="glow-center" style="background: radial-gradient(circle, rgba(201,168,76,0.18) 0%, transparent 55%);"></div>
    <div class="ghost-text gold-gradient" style="font-size:240px;bottom:-40px;left:-20px;" data-layout-allow-overflow>共美好</div>
    <div class="corner-tl"></div>
    <div class="corner-tr"></div>
    <div class="corner-bl"></div>
    <div class="corner-br"></div>

    <div class="scene-content center-text">
      <div class="accent-line center" id="s7-line"></div>
      <div class="headline-serif large gold" id="s7-title">共美好 · 创未来</div>
      <div class="body-text light closing-sub" id="s7-sub">
        恒海永远是你坚实的后盾。<br/>
        让我们一起并肩作战，铸就更加辉煌的明天！
      </div>
    </div>
    <div class="logo-text">恒海实业集团</div>

    <!-- 数字人 PiP 画中画 (结尾告别) -->
    <div id="avatar-pip-container-closing"
         style="position:absolute; bottom:60px; right:60px; width:320px; height:480px;
                border-radius:16px; overflow:hidden; box-shadow:0 8px 40px rgba(0,0,0,0.6);
                border:1px solid rgba(201,168,76,0.25); z-index:10; opacity:0;">
      <video id="avatar-video-closing-local"
             style="width:100%;height:100%;object-fit:cover;"
             src="../assets/avatar-closing.mp4"
             muted playsinline loop
             data-start="0" data-duration="19" data-track-index="5"
      ></video>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });
      tl.from("#s7-line",   { scaleX: 0, opacity: 0, duration: 0.5, ease: "power3.out" }, 0);
      tl.from("#s7-title",  { y: 40, opacity: 0, duration: 0.8, ease: "expo.out" }, 0.4);
      tl.from("#s7-sub",    { y: 25, opacity: 0, duration: 0.6, ease: "power2.out" }, 1.2);
      tl.to("#avatar-pip-container-closing", { opacity: 1, duration: 0.6, ease: "power2.out" }, 0.8);
      tl.to(".glow-center", { scale: 1.12, opacity: 1.0, duration: 6, ease: "sine.inOut", yoyo: true, repeat: 1 }, 1.7);
      window.__timelines["scene7"] = tl;
    </script>
  </div>
</template>
