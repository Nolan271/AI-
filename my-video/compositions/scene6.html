<template id="scene6-template">

    <div class="corner-tr"></div>
    <div class="corner-bl"></div>

    <div class="bottom-bar"></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });
      tl.from("#s6-label",  { y: 25, opacity: 0, duration: 0.4, ease: "power2.out" }, 0);
      tl.from("#s6-accent", { scaleX: 0, opacity: 0, duration: 0.5, ease: "power3.out" }, 0.2);
      tl.from("#s6-title",  { y: 30, opacity: 0, duration: 0.6, ease: "expo.out" }, 0.6);
      tl.from(".rule-card", { y: 30, opacity: 0, duration: 0.5, ease: "power2.out", stagger: 0.1 }, 1.2);
      tl.from("#s6-note",   { y: 15, opacity: 0, duration: 0.4, ease: "power2.out" }, 2.2);
      tl.to(".glow-left",   { scale: 1.05, opacity: 0.5, duration: 3.5, ease: "sine.inOut", yoyo: true, repeat: 2 }, 1);
      window.__timelines["scene6"] = tl;
    </script>
  </div>
