<template id="scene4-template">
  <div data-composition-id="scene4" data-width="1920" data-height="1080">
    <div class="vignette"></div>
    <div class="glow-bottom" style="left:50%;transform:translateX(-50%);"></div>
    <div class="ghost-text gold-gradient" style="font-size:130px;top:20px;right:30px;">考勤管理</div>
    <div class="corner-tl"></div>
    <div class="corner-tr"></div>
    <div class="corner-bl"></div>
    <div class="corner-br"></div>
    <div class="bottom-bar"></div>

    <div class="scene-content">
      <div class="label-gold" id="s4-label">考勤管理</div>
      <div class="accent-line" id="s4-accent"></div>
      <div class="headline-serif small" id="s4-title" style="font-size:48px;">工作时间与考勤要求</div>
      <div class="info-grid" id="s4-times" style="margin-top:18px;">
        <div class="info-card" style="min-width:260px;">
          <div class="label" style="font-size:20px;">工作日</div>
          <div class="num" style="font-size:36px; margin-top:8px;">周一至周六</div>
        </div>
        <div class="info-card" style="min-width:260px;">
          <div class="label" style="font-size:20px;">上午</div>
          <div class="num" style="font-size:36px; margin-top:8px;">9:00 — 12:00</div>
        </div>
        <div class="info-card" style="min-width:260px;">
          <div class="label" style="font-size:20px;">下午</div>
          <div class="num" style="font-size:36px; margin-top:8px;">13:30 — 18:00</div>
        </div>
      </div>
      <div class="tag-list" id="s4-rules" style="margin-top:16px;">
        <span class="tag-item" style="color:#efe8dc;">✓ 钉钉打卡 · 上下班签到</span>
        <span class="tag-item" style="color:#efe8dc;">✓ 因公外出提前提交申请</span>
        <span class="tag-item gold">⚠ 迟到/早退月超3次扣绩效10%</span>
        <span class="tag-item" style="border-color:rgba(212,160,56,0.3);color:#d4a038;">⚠ 旷工超3天解除劳动合同</span>
      </div>
    </div>
    <div class="logo-text">恒海实业集团</div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });
      tl.from("#s4-label",  { y: 25, opacity: 0, duration: 0.4, ease: "power2.out" }, 0);
      tl.from("#s4-accent", { scaleX: 0, opacity: 0, duration: 0.5, ease: "power3.out" }, 0.2);
      tl.from("#s4-title",  { y: 30, opacity: 0, duration: 0.6, ease: "expo.out" }, 0.6);
      tl.from(".info-card", { y: 30, opacity: 0, scale: 0.95, duration: 0.5, ease: "power2.out", stagger: 0.1 }, 1.2);
      tl.from("#s4-rules",  { y: 15, opacity: 0, duration: 0.4, ease: "power2.out" }, 2.2);
      tl.to(".glow-bottom", { scale: 1.06, opacity: 0.6, duration: 3, ease: "sine.inOut", yoyo: true, repeat: 2 }, 1);
      window.__timelines["scene4"] = tl;
    </script>
  </div>
</template>
