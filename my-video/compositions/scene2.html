<template id="scene2-template">
  <div data-composition-id="scene2" data-width="1920" data-height="1080">
    <div class="vignette"></div>
    <div class="glow-bottom" style="left:50%;transform:translateX(-50%);"></div>
    <div class="glow-left"></div>
    <div class="ghost-text gold-gradient" style="font-size:140px;top:50%;left:50%;transform:translate(-50%,-50%);">共美好 创未来</div>
    <div class="corner-tl"></div>
    <div class="corner-tr"></div>
    <div class="corner-bl"></div>
    <div class="corner-br"></div>
    <div class="bottom-bar"></div>

    <div class="scene-content center-text">
      <div class="accent-line center" id="s2-line"></div>
      <div class="label-gold" id="s2-label">企业文化</div>
      <div class="headline-serif gold" id="s2-mission" style="font-size:50px; max-width:1200px; margin-top:8px;">
        以科技创新驱动能源与产业发展
      </div>
      <div class="value-list" id="s2-values" style="margin-top:24px; align-items:center;">
        <div class="value-item">
          <div class="value-dot"></div>
          <span class="value-text">始于奋斗</span>
        </div>
        <div class="value-item">
          <div class="value-dot"></div>
          <span class="value-text">成于诚信</span>
        </div>
        <div class="value-item">
          <div class="value-dot"></div>
          <span class="value-text">持于创新</span>
        </div>
      </div>
      <div class="tag-list" id="s2-tags" style="justify-content:center; margin-top:20px;">
        <span class="tag-item gold">AI赋能</span>
        <span class="tag-item gold">敢想敢干敢担当</span>
        <span class="tag-item gold">碳硅基人才协同</span>
      </div>
      <div class="body-text light" id="s2-slogan" style="margin-top:24px; font-size:34px; font-weight:600; color:#c9a84c;">
        共美好 · 创未来
      </div>
    </div>
    <div class="logo-text">恒海实业集团</div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });
      tl.from("#s2-line",    { scaleX: 0, opacity: 0, duration: 0.5, ease: "power3.out" }, 0);
      tl.from("#s2-label",   { y: 25, opacity: 0, duration: 0.4, ease: "power2.out" }, 0.2);
      tl.from("#s2-mission", { y: 30, opacity: 0, duration: 0.6, ease: "expo.out" }, 0.6);
      tl.from(".value-item", { x: -30, opacity: 0, duration: 0.5, ease: "power2.out", stagger: 0.15 }, 1.2);
      tl.from("#s2-tags",    { y: 20, opacity: 0, duration: 0.4, ease: "power2.out" }, 2.2);
      tl.from("#s2-slogan",  { scale: 0.9, opacity: 0, duration: 0.6, ease: "back.out(1.5)" }, 2.9);
      tl.to(".glow-bottom", { scale: 1.05, opacity: 0.7, duration: 4, ease: "sine.inOut", yoyo: true, repeat: 2 }, 3.7);
      tl.to(".glow-left",    { scale: 1.08, opacity: 0.6, duration: 3.5, ease: "sine.inOut", yoyo: true, repeat: 2 }, 3);
      window.__timelines["scene2"] = tl;
    </script>
  </div>
</template>
